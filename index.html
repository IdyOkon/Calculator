<html>
    <body>
     <head>
       <title> Calculator </title>
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <meta charset="UTF-8">
       <meta name="keyword" content="Latest Android Smart phone, Iphone 17">
       <meta name="description" content="Gadgets">
       <meta name ='robot' content="nofollow, noindex">
       <link rel="stylesheet" href="font awesome/css/all.min.css"> 
       <script src="font awesome/js/all.min.js"> </script>
       <link rel="stylesheet" href="Calculator.css">
     </head>



<div class="calculator_container">
   <div class='calculator_frame'>
       <h5 class="calculator_name">Manful Calculator</h5>
       <div class="calculator_screen ">
         <h3 class="typing"></h3>
         <h4 class="answer"></h4>
       </div>

       <div class="calculator_btn">
         <button disabled class="btn ti  off_btn">off</button>
         <button class="btn  on_btn">on</button>
         <button disabled class="btn ti action">x</button>
         <button disabled class="btn ti action">+</button>
         <button disabled class="btn ti action">-</button>
         <button disabled class="btn ti action">/</button>
         <button disabled class="btn ti action">*</button>
         <button disabled class="btn ti action">%</button>
         <button disabled class="btn ti action">Exp</button>
         <button disabled class="btn ti action sqroot">&#8730</button>
         <button disabled class="btn ti action sin">sin</button>
         <button disabled class="btn ti action tan">tan</button>
         <button disabled class="btn ti action cos">cos</button>
         <button disabled class="btn ti bkspace" title="Backspace"> <i class="fas fa-backspace"></i>  </button>
         <button disabled class="btn ti clear" title="Clear">c</button>
        


         <button disabled class="btn ti action">1</button>
         <button disabled class="btn ti action">2</button>
         <button disabled class="btn ti action">3</button>
         <button disabled class="btn ti action">4</button>
         <button disabled class="btn ti action">5</button>
         <button disabled class="btn ti action">6</button>
         <button disabled class="btn ti action">7</button>
         <button disabled class="btn ti action">8</button>
         <button disabled class="btn ti action">9</button>
         <button disabled class="btn ti action">0</button>
         <button disabled class="btn ti action">00</button>
         <button disabled class="btn ti equalSign">=</button>
         


       </div>
   </div>
 </div>


   <script src="calculator.js"></script>
</body>

</html>
